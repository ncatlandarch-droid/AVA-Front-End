[build]
  publish = "."
  command = ""
  functions = "netlify/functions"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_PROJECT_ID"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"

[functions."gis-proxy"]
  timeout = 26

[functions."master-plan-render"]
  timeout = 26
